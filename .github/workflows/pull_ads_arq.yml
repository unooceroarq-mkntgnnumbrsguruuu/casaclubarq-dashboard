name: Pull ARQ Ads Data

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      mes:
        description: "Mes a procesar (YYYY-MM, dejar vacio = mes actual)"
        required: false
        default: ""

jobs:
  pull_ads:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install google-ads requests pyyaml

      - name: Escribir google-ads.yaml
        run: |
          echo "${{ secrets.GOOGLE_ADS_YAML }}" > ~/google-ads.yaml

      - name: Ejecutar pull de datos ARQ
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GOOGLE_ADS_YAML: ${{ secrets.GOOGLE_ADS_YAML }}
        run: |
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            python3 pull_ads_arq.py "${{ github.event.inputs.mes }}"
          else
            python3 pull_ads_arq.py
          fi
